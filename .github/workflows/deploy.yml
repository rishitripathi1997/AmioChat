name: Deploy

on:
  pull_request:
    branches: [master, main]
    paths:
      - 'infra/terraform/**'
      - 'packages/backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - prod

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'plan' }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: true
  AWS_REGION: us-east-1
  TF_VERSION: '1.9.8'

jobs:
  terraform-plan:
    name: Terraform plan (staging)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        working-directory: .

      - name: Terraform init (staging backend)
        run: terraform init -backend-config=backends/staging.hcl -input=false

      - name: Terraform plan
        run: terraform plan -var-file=environments/staging.tfvars -input=false -no-color -out=tfplan
        continue-on-error: true

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-staging
          path: infra/terraform/tfplan
          retention-days: 5

  terraform-apply:
    name: Terraform apply (${{ inputs.environment }})
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        working-directory: .

      - name: Terraform init
        run: terraform init -backend-config=backends/${{ inputs.environment }}.hcl -input=false

      - name: Terraform apply
        run: terraform apply -var-file=environments/${{ inputs.environment }}.tfvars -input=false -auto-approve

      - name: Terraform outputs
        run: terraform output -no-color
