version: 1
# Monorepo: commands run from repo root; app lives in apps/web.
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build --workspace @amiochat/web
      artifacts:
        # With buildPath: /, baseDirectory is relative to repo root (see AWS monorepo docs).
        baseDirectory: apps/web/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/web/.next/cache/**/*
